<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Request Quote - Alfodet XL-46 (L16)</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f3f3;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.quote-modal{

    width:100%;
    max-width:1300px;

    background:#f5f5f5;

    padding:40px;

    border-radius:8px;

    position:relative;

    box-shadow:
        0 8px 30px rgba(0,0,0,0.12);
}

.close-btn{

    position:absolute;

    right:25px;
    top:20px;

    font-size:42px;

    cursor:pointer;

    color:#111;
}

.title{

    font-size:32px;

    color:#444;

    line-height:1.4;

    margin-bottom:8px;
}

.product-name{

    font-size:42px;

    font-weight:700;

    color:#444;

    margin-bottom:50px;
}

.form-group{

    margin-bottom:28px;
}

.form-group input,
.form-group select,
.form-group textarea{

    width:100%;

    border:none;

    border-bottom:2px solid #d5d5d5;

    background:transparent;

    padding:12px 0;

    font-size:22px;

    color:#333;

    outline:none;
}

.form-group textarea{

    min-height:90px;

    resize:vertical;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{

    border-bottom-color:#555;
}

.submit-row{

    display:flex;

    justify-content:flex-end;

    margin-top:40px;
}

.submit-btn{

    min-width:220px;

    height:76px;

    border:2px solid #bcbcbc;

    background:#f8f8f8;

    border-radius:40px;

    font-size:24px;

    cursor:pointer;

    transition:0.3s;
}

.submit-btn:hover{

    background:#222;

    color:#fff;
}

.success{

    display:none;

    margin-top:20px;

    color:green;

    font-size:18px;
}

@media(max-width:768px){

    .quote-modal{

        padding:25px;
    }

    .title{

        font-size:22px;
    }

    .product-name{

        font-size:32px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea{

        font-size:18px;
    }

    .submit-btn{

        width:100%;
    }
}

</style>
</head>

<body>

<div class="quote-modal">

    <span class="close-btn">&times;</span>

    <div class="title">
        You are requesting a quote for
    </div>

    <div class="product-name">
        Alfodet XL-46 (L16)
    </div>

    <form id="quoteForm">

        <div class="form-group">
            <input
                type="text"
                name="name"
                placeholder="Name"
            >
        </div>

        <div class="form-group">
            <input
                type="email"
                name="email"
                placeholder="Email Address"
            >
        </div>

        <div class="form-group">
            <input
                type="tel"
                name="phone"
                placeholder="Phone Number"
            >
        </div>

        <div class="form-group">
            <input
                type="text"
                name="company"
                placeholder="Company"
            >
        </div>

        <div class="form-group">
            <input
                type="text"
                name="state"
                placeholder="State / Province / Region"
            >
        </div>

        <div class="form-group">
            <select name="country">

                <option value="India">
                    India
                </option>

                <option value="USA">
                    USA
                </option>

                <option value="Singapore">
                    Singapore
                </option>

                <option value="United Arab Emirates">
                    United Arab Emirates
                </option>

            </select>
        </div>

        <div class="form-group">

            <textarea
                name="message"
                maxlength="255"
                placeholder="Message (max 255 characters)"
            ></textarea>

        </div>

        <div class="submit-row">

            <button
                type="submit"
                class="submit-btn"
            >
                Submit
            </button>

        </div>

        <div
            id="success"
            class="success"
        >
            Quote request submitted successfully.
        </div>

    </form>

</div>

<script>

document
.getElementById('quoteForm')
.addEventListener(
    'submit',
    function(e){

        e.preventDefault();

        const f = e.target.elements;

        console.log({

            name:    f['name'].value,
            email:   f['email'].value,
            phone:   f['phone'].value,
            company: f['company'].value,
            state:   f['state'].value,
            country: f['country'].value,
            message: f['message'].value
        });

        document
        .getElementById('success')
        .style.display='block';

        setTimeout(() => {

            document
            .getElementById('success')
            .style.display='none';

            this.reset();

        },2000);
    }
);

document
.querySelector('.close-btn')
.addEventListener(
    'click',
    function(){

        alert('Close button clicked');
    }
);

</script>

<script>

(function () {

    // ============================================================
    // CONFIGURATION
    // ============================================================

    const SECURITI_ENDPOINT =
        'https://app.securiti.ai/privaci/v1/consentapi/consent_upload';

    const SECURITI_HEADERS = {

        'X-API-Key':
            'GYsPcqTmOKEXcXq7M15ElbXOsga80rk0W367rmk9',

        'X-API-Secret':
            '85fzFjPye5XzO8yjXLsa9bP0Ol3zcPjl5Yd17bXM',

        'X-TIDENT':
            '09f99b07-9b72-4dd3-b6b5-1009a96c2fd4',

        'Content-Type':
            'application/json'
    };

    let consentInFlight = false;

    // ============================================================
    // TARGET FORM
    // ============================================================

    const quoteForm =
        document.getElementById('quoteForm');

    if (!quoteForm) {

        console.error('Quote form not found');

        return;
    }

    // ============================================================
    // HELPER: read a field via form.elements (avoids the
    // form.name collision where form.name is the form property,
    // not the input named "name").
    // ============================================================

    function getValue(fieldName) {

        const el = quoteForm.elements[fieldName];

        return (el && typeof el.value === 'string')
            ? el.value.trim()
            : '';
    }

    // ============================================================
    // CONSENT CAPTURE
    // ============================================================

    quoteForm.addEventListener(
        'submit',
        async function () {

            if (consentInFlight) return;

            consentInFlight = true;

            try {

                // ============================================================
                // FIELD VALUES
                // ============================================================

                const name    = getValue('name');
                const email   = getValue('email');
                const phone   = getValue('phone');
                const company = getValue('company');
                const state   = getValue('state');
                const country = getValue('country');
                const message = getValue('message');

                // ============================================================
                // MULTIPLE UUIDS (single request)
                // ============================================================
                // Include every identifier the user provided so they
                // are all recorded together against the same subject.

                const uuids = {};

                if (email) uuids.email = email;
                if (phone) uuids.phone = phone;

                // Top-level primary UUID: prefer email, then phone.
                const primaryUUID =
                    email ||
                    phone ||
                    ('anonymous_' + Date.now());

                // ============================================================
                // PAYLOAD
                // ============================================================

                const payload = {

                    UUID: primaryUUID,

                    uuids: uuids,

                    activity_timestamp:
                        Math.floor(Date.now() / 1000),

                    consent_source:
                        'Godrej Chemicals - Request Quote Form',

                    custom_parameters: {
                    },

                    consent_info: [

                        {

                            processing_purpose_name:
                                'Quote Request',

                            consented_items: [

                                {

                                    consent_purpose_name:
                                        'Request Quote Submission',

                                    consent_granted:
                                        true,

                                    consent_status:
                                        'granted'
                                }
                            ]
                        }
                    ]
                };

                console.log('Consent Payload:', payload);

                // ============================================================
                // API CALL
                // ============================================================

                const response =
                    await fetch(
                        SECURITI_ENDPOINT,
                        {

                            method: 'POST',

                            headers:
                                SECURITI_HEADERS,

                            body:
                                JSON.stringify(payload)
                        }
                    );

                if (response.ok) {

                    const result =
                        await response.json();

                    console.log('Consent Uploaded:', result);
                }

                else {

                    const errorText =
                        await response.text();

                    console.error('Consent Upload Failed:', errorText);
                }

            }

            catch (error) {

                console.error('Consent Network Error:', error);
            }

            finally {

                consentInFlight = false;
            }
        }
    );

})();

</script>

</body>
</html>
